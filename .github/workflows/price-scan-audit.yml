# Standalone Layer-2 post-scan accuracy audit (no refresh).
# Use after a manual fix or to re-check the live snapshot without re-scanning eBay.
name: Price scan audit

on:
  workflow_dispatch: {}
  # Optional mid-day safety net (~2 PM CT / 19:00 UTC)
  schedule:
    - cron: "0 19 * * *"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run post-scan audit
        env:
          PRICE_API_URL: ${{ vars.PRICE_API_URL }}
        run: |
          set -euo pipefail
          BASE="${PRICE_API_URL:-https://ebay-api.aipickvault.com}"
          BASE="${BASE%/}"
          mkdir -p ebay-worker/_audit
          curl -fsS "$BASE/v1/snapshot" -o ebay-worker/_audit/snapshot.json
          curl -fsS "$BASE/health" -o ebay-worker/_audit/health.json
          python3 ebay-worker/audit_snapshot.py \
            --base-url "$BASE" \
            --snapshot ebay-worker/_audit/snapshot.json \
            --catalog ebay-worker/src/catalog.json \
            --report ebay-worker/_audit/report.json \
            --fail-on error

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: price-scan-audit
          path: ebay-worker/_audit/
